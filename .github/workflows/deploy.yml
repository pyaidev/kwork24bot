name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/kwork-bot
            git pull origin main 2>/dev/null || (git init && git remote add origin https://github.com/pyaidev/kwork24bot.git && git fetch origin && git checkout -f main)
            /root/kwork-bot/venv/bin/pip install -r requirements.txt -q
            systemctl restart kwork-bot
            echo "Deploy OK!"
